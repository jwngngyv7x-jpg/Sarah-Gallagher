<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Herbs | Holistic Herbs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="index.html" class="logo">🌿 Holistic Herbs</a>
        </div>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <h1>Medicinal Herb Shop</h1>
        <section class="product-grid">
            <div class="product-card">
                <img src="https://unsplash.com" alt="Chamomile Tea">
                <h3>Relaxing Chamomile</h3>
                <p>$12.99</p>
                <button class="cta-button">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="https://unsplash.com" alt="Lavender Sachets">
                <h3>Sleepy Lavender</h3>
                <p>$15.50</p>
                <button class="cta-button">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="https://unsplash.com" alt="Peppermint Tea">
                <h3>Pure Peppermint</h3>
                <p>$10.00</p>
                <button class="cta-button">Add to Cart</button>
            </div>
        </section>
    </main>
</body>
</html>
